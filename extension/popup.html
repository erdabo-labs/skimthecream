<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #e4e4e7;
      padding: 16px;
    }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .stat {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #27272a;
      font-size: 13px;
    }
    .stat-label { color: #71717a; }
    .stat-value { font-weight: 500; }
    .section { margin-top: 16px; }
    .section h2 { font-size: 12px; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    input {
      width: 100%;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e4e4e7;
      font-size: 12px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus { border-color: #34d399; }
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle label { font-size: 13px; }
    .switch {
      width: 40px; height: 22px;
      background: #27272a;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    .switch.on { background: #34d399; }
    .switch::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      background: white;
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .switch.on::after { transform: translateX(18px); }
    button {
      width: 100%;
      padding: 10px;
      background: #34d399;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    button:hover { background: #6ee7b7; }
    .status { font-size: 11px; color: #34d399; text-align: center; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <h1>SkimTheCream</h1>

  <div class="stat">
    <span class="stat-label">Total ingested</span>
    <span class="stat-value" id="total">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Last sync</span>
    <span class="stat-value" id="lastSync">Never</span>
  </div>

  <div class="toggle">
    <label>Auto-refresh tabs</label>
    <div class="switch" id="enableToggle"></div>
  </div>

  <div class="section">
    <h2>Supabase Connection</h2>
    <input type="text" id="supabaseUrl" placeholder="https://xxx.supabase.co" />
    <input type="text" id="supabaseAnonKey" placeholder="Anon key (eyJ...)" />
  </div>

  <button id="save">Save Settings</button>
  <div class="status" id="status">Saved!</div>

  <script src="popup.js"></script>
</body>
</html>
